name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "build-tools;34.0.0" "platforms;android-34" "platform-tools"

    - name: Extract ZIP
      run: |
        ZIP=$(find uploads/ -name "*.zip" | sort | tail -1)
        test -n "$ZIP" || (echo "No ZIP" && exit 1)
        unzip -q "$ZIP" -d project_src
        PROJ=$(find project_src -name "gradlew" -maxdepth 4 | head -1 | xargs dirname)
        echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

    - name: Fix gradle wrapper
      run: |
        mkdir -p "${{ env.PROJECT_DIR }}/gradle/wrapper"
        JAR="${{ env.PROJECT_DIR }}/gradle/wrapper/gradle-wrapper.jar"
        test -f "$JAR" || curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o "$JAR"

    - name: Fix CMakeLists
      run: |
        CMAKE="${{ env.PROJECT_DIR }}/app/src/main/cpp/CMakeLists.txt"
        if [ -f "$CMAKE" ] && grep -q "FetchContent" "$CMAKE"; then
          git clone --depth=1 https://github.com/barak/djvulibre.git /tmp/djvu
          mkdir -p "${{ env.PROJECT_DIR }}/app/src/main/cpp/djvulibre"
          cp -r /tmp/djvu/libdjvu "${{ env.PROJECT_DIR }}/app/src/main/cpp/djvulibre/libdjvu"
          python3 -c "
import sys
cmake = open(sys.argv[1]).read()
new = 'cmake_minimum_required(VERSION 3.18.1)\nproject(docstudio)\nset(DJVU ${CMAKE_SOURCE_DIR}/djvulibre/libdjvu)\nset(COM ${CMAKE_SOURCE_DIR}/common)\nset(JNI ${CMAKE_SOURCE_DIR}/djvu)\nfile(GLOB SRC ${DJVU}/*.cpp)\nadd_library(djvucore STATIC ${SRC})\ntarget_include_directories(djvucore PUBLIC ${DJVU})\ntarget_compile_definitions(djvucore PRIVATE -DHAVE_PTHREAD -DNO_LIBGCC_HOOKS -DHAVE_STDINT_H -DUNIX)\ntarget_compile_options(djvucore PRIVATE -fexceptions -frtti)\nadd_library(djvu SHARED ${JNI}/djvu.c ${COM}/list.c ${COM}/orion_bitmap.c)\ntarget_include_directories(djvu PRIVATE ${DJVU} ${JNI} ${COM})\ntarget_compile_definitions(djvu PRIVATE -DORION_FOR_ANDROID)\ntarget_compile_options(djvu PRIVATE -fexceptions -frtti)\ntarget_link_libraries(djvu djvucore android jnigraphics log m)\n'
open(sys.argv[1], 'w').write(new)
          " "$CMAKE"
        fi

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-

    - name: Build APK
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DocStudio-${{ github.run_number }}
        path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30