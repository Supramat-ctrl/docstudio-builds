name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug or release'
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;25.2.9519653" \
          "cmake;3.22.1" \
          "build-tools;34.0.0" \
          "platforms;android-34" \
          "platform-tools"

    - name: Find and extract project ZIP
      run: |
        ZIP=$(find uploads/ -name "*.zip" | sort | tail -1)
        if [ -z "$ZIP" ]; then echo "No ZIP found"; exit 1; fi
        echo "Extracting: $ZIP"
        unzip -q "$ZIP" -d project_src
        # Find the project root (where gradlew is)
        PROJ=$(find project_src -name "gradlew" | head -1 | xargs dirname)
        echo "Project root: $PROJ"
        echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('${{ env.PROJECT_DIR }}/**/*.gradle*') }}
        restore-keys: gradle-

    - name: Build APK
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Find APK
      id: apk
      run: |
        APK=$(find . -name "*.apk" | head -1)
        echo "path=$APK" >> $GITHUB_OUTPUT
        echo "APK: $APK ($(du -sh $APK | cut -f1))"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DocStudio-${{ github.run_number }}
        path: ${{ steps.apk.outputs.path }}
        retention-days: 30
