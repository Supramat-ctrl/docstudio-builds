name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug or release'
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;25.2.9519653" \
          "cmake;3.22.1" \
          "build-tools;34.0.0" \
          "platforms;android-34" \
          "platform-tools"

    - name: Find and extract project ZIP
      run: |
        ZIP=$(find uploads/ -name "*.zip" | sort | tail -1)
        if [ -z "$ZIP" ]; then echo "No ZIP found"; exit 1; fi
        echo "Extracting: $ZIP"
        unzip -q "$ZIP" -d project_src
        PROJ=$(find project_src -name "gradlew" | head -1 | xargs dirname)
        echo "Project root: $PROJ"
        echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

    - name: Fix gradle-wrapper.jar
      run: |
        WRAPPER_DIR="${{ env.PROJECT_DIR }}/gradle/wrapper"
        mkdir -p "$WRAPPER_DIR"
        if [ ! -f "$WRAPPER_DIR/gradle-wrapper.jar" ]; then
          echo "Downloading gradle-wrapper.jar..."
          GRADLE_VER=8.4
          GRADLE_VER=${GRADLE_VER:-8.4}
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VER}.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$WRAPPER_DIR/gradle-wrapper.jar" || \
          curl -sL "https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar" \
            -o "$WRAPPER_DIR/gradle-wrapper.jar"
          echo "gradle-wrapper.jar downloaded (size: $(wc -c < $WRAPPER_DIR/gradle-wrapper.jar) bytes)"
        else
          echo "gradle-wrapper.jar already present"
        fi

    - name: Fix CMakeLists FetchContent
      run: |
        CMAKE="${{ env.PROJECT_DIR }}/app/src/main/cpp/CMakeLists.txt"
        if [ -f "$CMAKE" ] && grep -q "FetchContent" "$CMAKE"; then
          echo "FetchContent detected - cloning DjVuLibre..."
          git clone --depth=1 https://github.com/barak/djvulibre.git /tmp/djvulibre_src
          CPP_DIR="${{ env.PROJECT_DIR }}/app/src/main/cpp"
          mkdir -p "$CPP_DIR/djvulibre"
          cp -r /tmp/djvulibre_src/libdjvu "$CPP_DIR/djvulibre/libdjvu"
          cat > "$CMAKE" << 'CMAKE_EOF'
cmake_minimum_required(VERSION 3.18.1)
project("docstudio")

set(DJVU_SRC "${CMAKE_SOURCE_DIR}/djvulibre/libdjvu")
set(ORION_COMMON "${CMAKE_SOURCE_DIR}/common")
set(DJVU_JNI    "${CMAKE_SOURCE_DIR}/djvu")

file(GLOB DJVUCORE_SOURCES "${DJVU_SRC}/*.cpp")
add_library(djvucore STATIC ${DJVUCORE_SOURCES})
target_include_directories(djvucore PUBLIC ${DJVU_SRC})
target_compile_definitions(djvucore PRIVATE
    -DHAVE_PTHREAD -DNO_LIBGCC_HOOKS -DHAVE_STDINT_H
    -DHAVE_NAMESPACES -DHAVE_STDINCLUDES -DHAS_WCHAR
    -DHAVE_WCHAR_H -DHAVE_MBSTATE_T -DHAS_MBSTATE -DUNIX
)
target_compile_options(djvucore PRIVATE -fexceptions -frtti)

add_library(djvu SHARED
    ${DJVU_JNI}/djvu.c
    ${ORION_COMMON}/list.c
    ${ORION_COMMON}/orion_bitmap.c
)
target_include_directories(djvu PRIVATE ${DJVU_SRC} ${DJVU_JNI} ${ORION_COMMON})
target_compile_definitions(djvu PRIVATE -DORION_FOR_ANDROID)
target_compile_options(djvu PRIVATE -fexceptions -frtti)
target_link_libraries(djvu djvucore android jnigraphics log m)

if(ANDROID_ABI STREQUAL "arm64-v8a" OR ANDROID_ABI STREQUAL "x86_64")
    target_link_libraries(djvu -Wl,-z,max-page-size=16384)
endif()
CMAKE_EOF
          echo "CMakeLists.txt patched"
        else
          echo "No FetchContent - skipping"
        fi

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-

    - name: Build APK
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Find APK
      id: apk
      run: |
        APK=$(find . -name "*.apk" | head -1)
        echo "path=$APK" >> $GITHUB_OUTPUT
        echo "APK: $APK ($(du -sh $APK | cut -f1))"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DocStudio-${{ github.run_number }}
        path: ${{ steps.apk.outputs.path }}
        retention-days: 30
