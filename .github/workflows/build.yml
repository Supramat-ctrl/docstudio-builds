name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug or release'
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;25.2.9519653" \
          "cmake;3.22.1" \
          "build-tools;34.0.0" \
          "platforms;android-34" \
          "platform-tools"

    - name: Find and extract project ZIP
      run: |
        ZIP=$(find uploads/ -name "*.zip" | sort | tail -1)
        if [ -z "$ZIP" ]; then echo "No ZIP found"; exit 1; fi
        unzip -q "$ZIP" -d project_src
        PROJ=$(find project_src -name "gradlew" | head -1 | xargs dirname)
        echo "PROJECT_DIR=$PROJ" >> $GITHUB_ENV

    - name: Fix gradle-wrapper.jar
      run: |
        WRAPPER_DIR="${{ env.PROJECT_DIR }}/gradle/wrapper"
        mkdir -p "$WRAPPER_DIR"
        if [ ! -f "$WRAPPER_DIR/gradle-wrapper.jar" ]; then
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o "$WRAPPER_DIR/gradle-wrapper.jar"
          echo "Downloaded gradle-wrapper.jar"
        fi

    - name: Fix CMakeLists
      run: |
        CMAKE="${{ env.PROJECT_DIR }}/app/src/main/cpp/CMakeLists.txt"
        if [ -f "$CMAKE" ] && grep -q "FetchContent" "$CMAKE"; then
          git clone --depth=1 https://github.com/barak/djvulibre.git /tmp/djvu
          CPP="${{ env.PROJECT_DIR }}/app/src/main/cpp"
          mkdir -p "$CPP/djvulibre"
          cp -r /tmp/djvu/libdjvu "$CPP/djvulibre/libdjvu"
          cat > "$CMAKE" << 'CMEOF'
cmake_minimum_required(VERSION 3.18.1)
project(docstudio)
set(DJVU_SRC ${CMAKE_SOURCE_DIR}/djvulibre/libdjvu)
set(COMMON ${CMAKE_SOURCE_DIR}/common)
set(JNI ${CMAKE_SOURCE_DIR}/djvu)
file(GLOB SRC ${DJVU_SRC}/*.cpp)
add_library(djvucore STATIC ${SRC})
target_include_directories(djvucore PUBLIC ${DJVU_SRC})
target_compile_definitions(djvucore PRIVATE -DHAVE_PTHREAD -DNO_LIBGCC_HOOKS -DHAVE_STDINT_H -DHAVE_NAMESPACES -DUNIX)
target_compile_options(djvucore PRIVATE -fexceptions -frtti)
add_library(djvu SHARED ${JNI}/djvu.c ${COMMON}/list.c ${COMMON}/orion_bitmap.c)
target_include_directories(djvu PRIVATE ${DJVU_SRC} ${JNI} ${COMMON})
target_compile_definitions(djvu PRIVATE -DORION_FOR_ANDROID)
target_compile_options(djvu PRIVATE -fexceptions -frtti)
target_link_libraries(djvu djvucore android jnigraphics log m)
CMEOF
        fi

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-

    - name: Build APK
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Find and upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DocStudio-${{ github.run_number }}
        path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30